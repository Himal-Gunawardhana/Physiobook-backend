# ============================================================
#  Nginx reverse proxy for Physiobook API
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Security headers ──────────────────────────────────────
  add_header X-Frame-Options         "SAMEORIGIN"             always;
  add_header X-Content-Type-Options  "nosniff"                always;
  add_header X-XSS-Protection        "1; mode=block"          always;
  add_header Referrer-Policy         "strict-origin"           always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Gzip ──────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 256;

  # ── Rate limiting zones ────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── Upstream — Node.js API ────────────────────────────────
  upstream physiobook_api {
    server api:4000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production (uncomment below)
    # return 301 https://$host$request_uri;

    # ── Health check (bypass rate limit) ─────────────────────
    location /health {
      proxy_pass         http://physiobook_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      access_log         off;
    }

    # ── Auth endpoints (strict rate limit) ──────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://physiobook_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Stripe webhook (raw body forwarded) ────────────────
    location /api/v1/payments/webhook {
      proxy_pass         http://physiobook_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }

    # ── WebSocket chat ─────────────────────────────────────
    location /ws/ {
      proxy_pass         http://physiobook_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── General API ────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://physiobook_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
      client_max_body_size 10m;
    }

    # ── Block common exploit paths ─────────────────────────
    location ~* \.(php|asp|aspx|jsp)$ {
      return 444;
    }
  }
}
